    background:#0b1220;

    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    cursor:pointer;
    background:transparent;
    transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }

    background:var(--pri);
    border-color:var(--pri);
    color:#fff;
  }
  label.opt:has(input[type="radio"]:checked) span{
    color:#fff;
    font-weight:600;
  }
  label.opt:has(input[type="radio"]:focus-visible){
    box-shadow:0 0 0 3px rgba(79,70,229,.35);
    border-color:var(--pri);
  }

  .btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--pri);
    border:none;
    color:#fff;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600
  }
  .btn.ok{background:var(--ok)}
  .btn:disabled{opacity:.6;cursor:not-allowed}

  .msg{
    margin:10px 0;
    padding:10px;
    border-radius:8px
  }
  .okbox{background:#052e1a;border:1px solid #114d2a;color:#b3f7c1}
  .errbox{background:#3b0d0d;border:1px solid #5b1919;color:#ffd0d0}
  .warnbox{background:#3a2903;border:1px solid #5c4307;color:#ffe6b0}

<script>
// ======== CONFIG SUPABASE ========
const SUPABASE_URL = "https://ydypdeafbcdcamwigjuq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_lg9teAniku65cd2dnZJvIQ_Zii0XneZ";
const TEST_CODE_FIXO = "SSRS_PROFESSORES_V2";
const CODE = TEST_CODE_FIXO;
const AREA_PACIENTE_URL = "https://integradaneuropsicologia.github.io/area-do-paciente-v2/";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// ======== HELPERS ========
const $ = s => document.querySelector(s);
const onlyDigits = s => (s||"").replace(/\D+/g,"");
const qs = k => new URLSearchParams(location.search).get(k) || "";
const TOKEN = qs("token");
const AUTOSAVE_KEY = `${CODE}_${TOKEN||"no_token"}`;

function setBox(id, text, kind="ok"){
  const el=$(id); if(!el) return;
  el.textContent=text;
  el.className="msg "+(kind==="ok"?"okbox":kind==="warn"?"warnbox":"errbox");
  el.style.display="block";
}
function hideBox(id){
  const el=$(id);
  if(el){
    el.style.display="none";
    el.textContent="";
  }
}
function maskCPF(cpf){
  const d=onlyDigits(cpf||"");
  if(d.length!==11) return cpf||"";
  return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
}
function fmtDateISO(iso){
  if(!iso) return "";
  const [y,m,d]=String(iso).split("-");
  return (y&&m&&d)?`${d}/${m}/${y}`:iso;
}
function goPortalWithToken(){
  redirectToAreaPaciente();
}
function redirectToAreaPaciente(cpf){
  try{
    const u = new URL(AREA_PACIENTE_URL, location.href);
    const token = getTokenFromUrl();
    if(token) u.searchParams.set("token", token);
    else if(cpf) u.searchParams.set("cpf", normalizeCPF(cpf));
    location.href = u.toString();
  }catch(_){
    const token = getTokenFromUrl();
    const sep = AREA_PACIENTE_URL.includes("?") ? "&" : "?";
    location.href = AREA_PACIENTE_URL + (token ? sep + "token=" + encodeURIComponent(token) : "");
  }
}
function normalizeCPF(cpf){ return String(cpf || "").replace(/\D/g, ""); }
function getTokenFromUrl(){
  const params = new URLSearchParams(location.search);
  return String(params.get("token") || params.get("t") || TOKEN || "").trim();
}
function getTestCodeFromUrl(){
  const params = new URLSearchParams(location.search);
  return String(params.get("form") || params.get("code") || TEST_CODE_FIXO).trim();
}
function isObject(v){ return v && typeof v === "object" && !Array.isArray(v); }
function containsTestCode(jsonb, testCode){
  if(!jsonb) return false;
  if(typeof jsonb === "string") return jsonb === testCode;
  if(Array.isArray(jsonb)){
    return jsonb.some(item => {
      if(typeof item === "string") return item === testCode;
      if(isObject(item)) return item.code === testCode || item.test_code === testCode || item.id === testCode || containsTestCode(item, testCode);
      return false;
    });
  }
  if(isObject(jsonb)){
    if(Object.prototype.hasOwnProperty.call(jsonb, testCode)){
      const value = jsonb[testCode];
      return value !== false && value !== null && value !== undefined;
    }
    if(jsonb.code === testCode || jsonb.test_code === testCode || jsonb.id === testCode) return true;
    return Object.values(jsonb).some(v => containsTestCode(v, testCode));
  }
  return false;
}
function isTestLiberado(testsLiberados, testCode){
  if(!containsTestCode(testsLiberados, testCode)) return false;
  if(isObject(testsLiberados) && Object.prototype.hasOwnProperty.call(testsLiberados, testCode)){
    const v = testsLiberados[testCode];
    if(typeof v === "boolean") return v;
    if(isObject(v) && "liberado" in v) return Boolean(v.liberado);
    if(typeof v === "string") return !["false", "0", "nao", "não"].includes(v.toLowerCase());
    return Boolean(v);
  }
  return true;
}
function isTestFeito(testsFeitos, testCode){
  if(!containsTestCode(testsFeitos, testCode)) return false;
  if(isObject(testsFeitos) && Object.prototype.hasOwnProperty.call(testsFeitos, testCode)){
    const v = testsFeitos[testCode];
    if(typeof v === "boolean") return v;
    if(isObject(v) && "feito" in v) return Boolean(v.feito);
    if(typeof v === "string") return !["false", "0", "nao", "não"].includes(v.toLowerCase());
    return Boolean(v);
  }
  return true;
}
function normalizeTestsFeitosForSave(current){
  const out = {};
  if(!current) return out;
  if(typeof current === "string") { out[current] = true; return out; }
  if(Array.isArray(current)){
    current.forEach(item => {
      if(typeof item === "string") out[item] = true;
      else if(isObject(item)) out[item.code || item.test_code || item.id || JSON.stringify(item)] = item;
    });
    return out;
  }
  if(isObject(current)) return { ...current };
  return out;
}
function buildUpdatedTestsFeitos(current, testCode, submittedAt){
  const out = normalizeTestsFeitosForSave(current);
  out[testCode] = { feito: true, submitted_at: submittedAt };
  return out;
}
async function getPatientFormAccessByToken(){
  const token = getTokenFromUrl();
  const testCode = getTestCodeFromUrl();
  if(!token || !testCode) return { data: null, error: new Error("Link invalido ou formulario nao informado.") };
  const { data, error } = await supabaseClient.rpc("get_public_patient_form_access", {
    p_token: token,
    p_form_code: testCode
  });
  if(error) return { data: null, error };
  return { data: Array.isArray(data) ? data[0] : data, error: null };
}
async function validarAcessoAoTeste(){
  const token = getTokenFromUrl();
  const testCode = getTestCodeFromUrl();
  if(!token){
    setBox("#alert", "Link inválido ou expirado. Abra o formulário pela área do paciente.", "err");
    return null;
  }
  setBox("#alert", "Validando acesso ao formulário...", "warn");
  const { data, error } = await getPatientFormAccessByToken();
  if(error){
    console.error(error);
    setBox("#alert", "Não foi possível validar o acesso ao formulário.", "err");
    return null;
  }
  if(!data){
    setBox("#alert", "Token inválido, expirado ou sem CPF vinculado.", "err");
    return null;
  }
  if(!isTestLiberado(data.tests_liberados, testCode)){
    setBox("#alert", "Este formulário não está liberado para você.", "err");
    return null;
  }
  if(isTestFeito(data.tests_feitos, testCode)){
    setBox("#alert", "Você já respondeu este formulário. Voltando ao portal...", "ok");
    setTimeout(() => redirectToAreaPaciente(data.cpf), 1000);
    return null;
  }
  return data;
}
// ======== ITENS ========
const ITEMS = [

const TOTAL_ITEMS = ITEMS.length;

// Escalas de resposta
const CHOICES_A = [
  {label:"Nunca", value:0},
  {label:"Algumas vezes", value:1},
  {label:"Muito frequente", value:2},
];
const CHOICES_B = [
  {label:"Entre os 10% piores", value:1},
  {label:"Entre os 20% piores", value:2},
  {label:"Entre os 40% médios", value:3},
  {label:"Entre os 20% bons", value:4},
  {label:"Entre os 10% ótimos", value:5},
];

// ======== AGRUPAMENTOS ========
const range=(a,b)=>Array.from({length:b-a+1},(_,k)=>a+k);

// Habilidades sociais
const HABILIDADES = {
  F1: [6,10,13,14,20,21],
  F2: [1,4,8,9,12,18,19,22],
  F3: [2,3,5,7,11],
  F4: [15,16,17],
};
// Problemas de comportamento
const PROB_COMPORT = {
  F1: [23,25,31,32,33,34],
  F2: [27,28,30,36],
  F3: [24,26,29,35],
};
// Competência acadêmica
const COMP_ACAD = range(37,45);

/* utilitário soma lista */
function sumList(list, answers){
  return (list||[]).reduce((s,i)=> s + (answers[i] ?? 0), 0);
}

/* pontua todas escalas/fatores */
function computeScores(answers){
  const hsF1 = sumList(HABILIDADES.F1, answers);
  const hsF2 = sumList(HABILIDADES.F2, answers);
  const hsF3 = sumList(HABILIDADES.F3, answers);
  const hsF4 = sumList(HABILIDADES.F4, answers);
  const hsTotal = hsF1 + hsF2 + hsF3 + hsF4;

  const pcF1 = sumList(PROB_COMPORT.F1, answers);
  const pcF2 = sumList(PROB_COMPORT.F2, answers);
  const pcF3 = sumList(PROB_COMPORT.F3, answers);
  const pcGeral = pcF1 + pcF2 + pcF3;

  const caTotal = sumList(COMP_ACAD, answers);

  return {
    habilidades: { F1:hsF1, F2:hsF2, F3:hsF3, F4:hsF4, total:hsTotal },
    problemas:   { F1:pcF1, F2:pcF2, F3:pcF3, geral:pcGeral },
    academico:   { comp_academica: caTotal }
  };
}

/* string CSV (coluna categoria) */
function buildCategoriaCSV(scores){
  return [
    `HS_F1=${scores.habilidades.F1}`,
    `HS_F2=${scores.habilidades.F2}`,
    `HS_F3=${scores.habilidades.F3}`,
    `HS_F4=${scores.habilidades.F4}`,
    `HS_Total=${scores.habilidades.total}`,

    `PC_F1=${scores.problemas.F1}`,
    `PC_F2=${scores.problemas.F2}`,
    `PC_F3=${scores.problemas.F3}`,
    `PC_Geral=${scores.problemas.geral}`,

    `Competencia_Academica=${scores.academico.comp_academica}`
  ].join(",");
}

// ======== RENDER ========
function renderQuestions(){
  const host=$("#qs"); host.innerHTML="";
  ITEMS.forEach((text, idx)=>{
    const n=idx+1;
    const qn=String(n).padStart(2,"0");
    const wrap=document.createElement("div");
    wrap.className="q";
    wrap.setAttribute("role","group");
    wrap.setAttribute("aria-labelledby",`lbl${qn}`);

    wrap.innerHTML = `<h3 id="lbl${qn}">${n}. ${text}</h3>`;

    const opts=document.createElement("div");
    opts.className="opts";

    const CHS = n<=36 ? CHOICES_A : CHOICES_B;
    CHS.forEach((c,i)=>{
      const id=`q${qn}_${i}`;
      const lab=document.createElement("label");
      lab.className="opt";
      lab.innerHTML=`
        <input type="radio" name="q${qn}" id="${id}" value="${c.value}" required>
        <span>${c.label}</span>`;
      opts.appendChild(lab);
    });

    wrap.appendChild(opts);
    host.appendChild(wrap);
  });

  const updateProg=()=>{
    const answered=document.querySelectorAll('#qs input[type="radio"]:checked').length;
    $("#progress").textContent=`${answered}/${TOTAL_ITEMS} respondidas`;
  };
  host.addEventListener("change", ()=>{
    updateProg();
    autosaveAnswers();
  });
  updateProg();
}

// ======== AUTOSAVE ========
function autosaveAnswers(){
  const answers={};
  for(let i=1;i<=TOTAL_ITEMS;i++){
    const qn=`q${String(i).padStart(2,"0")}`;
    const sel=document.querySelector(`input[name="${qn}"]:checked`);
    if(sel) answers[i]=Number(sel.value);
  }
  try{
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({
      code: CODE,
      token: TOKEN,
      answers
    }));
  }catch(_){}
}
function restoreAutosave(){
  try{
    const raw=localStorage.getItem(AUTOSAVE_KEY);
    if(!raw) return;
    const {answers}=JSON.parse(raw)||{};
    if(!answers) return;
    Object.entries(answers).forEach(([i,val])=>{
      const qn=String(i).padStart(2,"0");
      const el=document.querySelector(`input[name="q${qn}"][value="${val}"]`);
      if(el) el.checked=true;
    });
    const answered=Object.keys(answers).length;
    $("#progress").textContent=`${answered}/${TOTAL_ITEMS} respondidas`;
  }catch(_){}
}
function clearAutosave(){
  try{ localStorage.removeItem(AUTOSAVE_KEY); }catch(_){}
}

/* ======== ESTADO GERAL ======== */
let patient = null, tokenRow = null, CPF = "";
let startAt = Date.now();

/* ======== BOOT SUPABASE ======== */
(async function boot(){
  try{
    const access = await validarAcessoAoTeste();

})();

function renderPatientInfo(){
  const g = document.querySelector("#pacInfo");
  g.innerHTML = "";
  const info = [
    ["Nome", patient.nome || "-"],
    ["Nascimento", fmtDateISO(patient.data_nascimento)]
  ];
  for(const [k, v] of info){
    const d = document.createElement("div");

/* ======== SUBMIT SUPABASE ======== */
let sending = false;

function choicesForItem(index){
  if(typeof CHOICES_A !== "undefined" && typeof CHOICES_B !== "undefined") return index <= 36 ? CHOICES_A : CHOICES_B;
  if(typeof CHOICES !== "undefined") return CHOICES;
  return [];
}

function labelForItem(index, value){
  const found = choicesForItem(index).find(c => String(c.value) === String(value));
  return found ? found.label : String(value);
}

function humanizeKey(key){
  return String(key || "").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function addScoreRows(prefix, value, out){
  if(value && typeof value === "object" && !Array.isArray(value)){
    Object.entries(value).forEach(([key, nested]) => addScoreRows(prefix ? prefix + "_" + key : key, nested, out));
    return;
  }
  out.push({ key: prefix, label: humanizeKey(prefix), value });
}

function buildReadableResults(answers){
  return ITEMS.map((text, idx) => {
    const numero = idx + 1;
    const pontuacao = answers[numero];
    return {
      numero,
      pergunta: text,
      resposta: labelForItem(numero, pontuacao),
      pontuacao
    };
  });
}

function buildResultsMeta(scores, totalAll, durationSec, categoriaCsv){
  const meta = [
    { key: "pontuacao_total", label: "Pontuação total", value: totalAll },
    { key: "categoria_csv", label: "Categorias", value: categoriaCsv },
    { key: "duracao_segundos", label: "Duração em segundos", value: durationSec }
  ];
  Object.entries(scores || {}).forEach(([key, value]) => addScoreRows(key, value, meta));
  return meta;
}

const formEl = document.querySelector("#form");
formEl.addEventListener("submit", async (e) => {
  e.preventDefault();
  if(sending) return;
  sending = true;
  hideBox("#msg");

  const btn = document.querySelector("#btnSubmit");
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try{
    if(!patient) throw new Error("Sessão inválida. Recarregue o link.");

    const answers = {};
    let firstMissing = null;
    for(let i = 1; i <= TOTAL_ITEMS; i++){
      const qn = `q${String(i).padStart(2, "0")}`;
      const sel = document.querySelector(`input[name="${qn}"]:checked`);
      if(!sel && firstMissing === null) firstMissing = i;
      if(sel) answers[i] = Number(sel.value);
    }

    if(firstMissing){
      setBox("#msg", `Responda o item ${firstMissing}.`, "warn");
      document.getElementById(`lbl${String(firstMissing).padStart(2, "0")}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
      sending = false;
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    const cpf = normalizeCPF(patient.cpf || CPF);
    const testCode = getTestCodeFromUrl();
    const submittedAt = new Date().toISOString();
    const scores = computeScores(answers);
    const categoriaCsv = buildCategoriaCSV(scores);
    const durationSec = Math.round((Date.now() - startAt) / 1000);
    const totalAll = Object.values(answers).reduce((sum, value) => sum + value, 0);
    const resultsPayload = buildReadableResults(answers);
    const resultsMetaPayload = buildResultsMeta(scores, totalAll, durationSec, categoriaCsv);

    const { data: patientRow, error: patientError } = await getPatientFormAccessByToken();
    if(patientError) throw new Error("Erro ao validar paciente antes de salvar.");
    if(!patientRow) throw new Error("CPF não encontrado.");
    if(!isTestLiberado(patientRow.tests_liberados, testCode)) throw new Error("Teste não liberado.");
    if(isTestFeito(patientRow.tests_feitos, testCode)){
      setBox("#msg", "Este formulário já foi enviado anteriormente. Voltando ao portal...", "ok");
      setTimeout(() => redirectToAreaPaciente(cpf), 900);
      return;
    }

    const { error: submitError } = await supabaseClient.rpc("submit_public_patient_form_response", {
      p_token: getTokenFromUrl(),
      p_form_code: testCode,
      p_form_name: "Inventário de Habilidades Sociais, Problemas de Comportamento e Competências Acadêmicas para Crianças - Respondido por professores",
      p_results: resultsPayload,
      p_results_meta: resultsMetaPayload
    });
    if(submitError){
      throw new Error(("Erro ao salvar respostas: " + (submitError.message || "")).trim());
    }

    clearAutosave();
    setBox("#msg", "Formulário enviado. Retornando ao portal...", "ok");
    setTimeout(() => redirectToAreaPaciente(cpf), 900);
  }catch(err){
    console.error(err);
    setBox("#msg", err.message || "Falha ao enviar. Tente novamente.", "err");
    sending = false;
    btn.disabled = false;
    btn.textContent = originalText;
  }
});</script>
</body>
